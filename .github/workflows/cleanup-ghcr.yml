name: Cleanup GHCR

on:
  schedule:
    - cron: '0 3 1 * *'   # 1st of every month, 03:00 UTC
  workflow_dispatch:

permissions:
  packages: write
  contents: write   # required to delete release assets

jobs:
  cleanup-ghcr:
    name: Remove old GHCR images (keep last 3 releases)
    runs-on: ubuntu-latest
    steps:
      # Each multi-arch release produces 3 GHCR versions:
      #   1 index manifest (tagged)  +  1 amd64 child  +  1 arm64 child (both untagged)
      # → min-versions-to-keep = 3 releases × 3 = 9
      - name: Delete old tagged versions (keep last 3 releases)
        uses: actions/delete-package-versions@v5
        with:
          package-name: visualizer-lite
          package-type: container
          min-versions-to-keep: 9
          ignore-versions: '^latest$'
          delete-only-untagged-versions: false

      # No separate untagged-cleanup step: Step 1 already removes untagged platform
      # children of deleted releases (they are older than the 9 kept versions).
      # A dedicated delete-only-untagged step with min-versions-to-keep: 0 would
      # also wipe the amd64/arm64 children of the 3 releases we keep, breaking
      # multi-arch pulls even though the tag remains visible.

  cleanup-release-assets:
    name: Remove tar.gz assets from releases older than top 3
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Delete tar.gz assets from old releases
        run: |
          tags=$(gh release list --repo "$REPO" --json tagName,publishedAt \
            --jq 'sort_by(.publishedAt) | reverse | .[3:] | .[].tagName')

          for tag in $tags; do
            asset_ids=$(gh release view "$tag" --repo "$REPO" \
              --json assets --jq '.assets[].id')
            for asset_id in $asset_ids; do
              echo "Deleting asset $asset_id from release $tag"
              gh api --method DELETE "repos/$REPO/releases/assets/$asset_id"
            done
          done
